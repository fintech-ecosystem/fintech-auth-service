spring:
  datasource:
    url: jdbc:h2:mem:fintech_auth;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: test-secret-must-be-at-least-thirty-two-chars
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 7

logging:
  level:
    root: WARN
    kuan.fintech.fintech_auth_service: INFO
    org.springframework: WARN
    org.hibernate.SQL: WARN
